McpAiInfoDlg.title=AI/MCP info dialog

McpAiInfoDlg.info=<html>By starting an MCP-Server SQuirreL Sessions can be accessed by AIs.<br>\
  SQuirreL's MCP-Server offers AI to access some metadata like tables and allows AIs to execute SQL statements.<br>\
  HOWTO:<br>\
  <ul>\
  <li>In case the AI accesses SQuirreL's MCP-Server for the first time, use the &quot;Save AI config MD file&quot;-button.<br>\
  This will tell the AI how to use SQuirreL's MCP-Server.</li>\
  <li>After an MCP-Server was started use the &quot;Copy port-prompt&quot; button to copy an AI prompt to the clipboard and paste it to your AI.<br>\
  To prove the MCP access works the AI is asked to print the Session's name.</li>\
  <li>Take a look at the options the offered by the checkboxes the MCP-panel offers.</li>\
  </ul>\
  Features:<br>\
  <ul>\
  <li>The MCP-Server offers AIs access to some of the most common database metadata like tables<br>\
  and columns and allows to execute SQL statements.</li>\
  <li>The checkboxes of the MCP-panel allow to fine tune the AI's access.</li>\
  <li>AIs are not offered direct access the JDBC-API all access is controlled by SQuirreL</li>\
  </ul>\
  </html>

McpAiInfoDlg.ok=Ok
